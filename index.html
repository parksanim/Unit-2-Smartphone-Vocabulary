 .top-header {
  position: relative;       /* change from absolute */
  margin-top: 10vh;
  margin-bottom: 4vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  z-index: 2;
}
.unit-heading {
  color: #ffffff;
  font-size: clamp(24px, 7vw, 36px);
  font-weight: bold;
  letter-spacing: 1px;
  text-shadow: none;
  line-height: 1.3;
  text-align: center;
}
.counter {
  color: #ffffff;
  font-size: 14px;
  letter-spacing: 2px;
  text-shadow: none;
  text-transform: uppercase;
  font-weight: bold;
}
    /* Plaque area - positioned to match the brass plate in the image */
    .plaque-wrapper {
      position: relative;
      width: 310px;
      margin-top: -10px;
    }
.plaque-content {
  width: 100%;
  height: 100%;
  padding: 22% 12% 18% 12%;        /* more top/bottom space inside plaque */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
    .card-label {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #5a3a10;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .card-text {
      font-family: 'Georgia', serif;
      color: #1a0a00;
      font-size: 30px;
      font-weight: bold;
      line-height: 1.35;
      text-shadow: 0 1px 2px rgba(255,220,120,0.3);
    }
.card-text.definition {
  font-size: clamp(16px, 4.5vw, 20px);
  font-weight: bold;
  font-style: italic;
  color: #1a0a00;
}
    /* Buttons row */
.buttons {
  padding: 4vh 0 6vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
}
.btn-flip {
  background: linear-gradient(135deg, #c8a028, #e8c84a, #a87820, #d4a830);
  color: #2a1000;
  border: 3px solid #7a5010;
  border-radius: 6px;
  padding: 12px 0;
  width: 60%;
  max-width: 240px;
  font-size: clamp(16px, 4.5vw, 18px);
  font-weight: bold;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 4px 15px #0006, inset 0 1px 0 #fff8;
  text-shadow: 0 1px 2px #ffdc64;
}

.btn-flip:active {
  transform: translateY(2px);
  box-shadow: 0 2px 8px #0006;
}

.nav-row {
  display: flex;
  gap: 16px;
}

.btn-nav {
  background: linear-gradient(135deg, #7a5010, #a87020, #7a5010);
  color: #f0d060;
  border: 2px solid #4a3010;
  border-radius: 6px;
  padding: 10px 28px;
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
}

.btn-nav:active {
  transform: translateY(2px);
}

/* Flip animation */
.flip-container {
  flex: 0 0 auto;
  margin: 0 auto 8vh;
  width: 92%;
  max-width: 380px;
  perspective: 1000px;
}

.flip-inner {
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  width: 100%;
}

.flip-inner.flipped {
  transform: rotateY(180deg);
}

.flip-front, .flip-back {
  backface-visibility: hidden;
  width: 100%;
}

.flip-back {
  position: absolute;
  top: 0; left: 0;
  transform: rotateY(180deg);
}

<body>
<div class="phone-frame">
  <div class="bg"></div>
  <div class="overlay">
    <div class="top-header">
      <div class="unit-heading">Unit 3:<br>Smartphone Technology</div>
      <div class="counter" id="counter">Card 1 of 15</div>
    </div>
    <div class="flip-container">
      <div class="flip-inner" id="flipInner">
        <div class="flip-front">
          <div class="plaque-content">
            <div class="card-label">Term</div>
            <div class="card-text" id="termText"></div>
          </div>
        </div>
        <div class="flip-back">
          <div class="plaque-content">
            <div class="card-label">Definition</div>
            <div class="card-text definition" id="defText"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="buttons">
      <button class="btn-flip" onclick="flipCard()">&#9654; FLIP</button>
      <div class="nav-row">
        <button class="btn-nav" onclick="prevCard()">&#9664; PREV</button>
        <button class="btn-nav" onclick="nextCard()">NEXT &#9654;</button>
      </div>
    </div>
  </div>
</div>
<script>
const cards = [
  { term: "Plug in", definition: "To connect a piece of electrical equipment to a power source." },
  { term: "Run out of", definition: "To use all of something so that there is none left." },
  { term: "Go off", definition: "To make a loud noise or a ringing sound (like an alarm)." },
  { term: "Scroll through", definition: "To move through a lot of text or many images on a screen." },
  { term: "Top up", definition: "To add more money or data to a mobile phone account." },
  { "term": "Back up", "definition": "BACK UP (verb) to make a copy of data/files. BACKUP (noun) a copy of data/files." },
  { "term": "Pop up", "definition": "POP UP (verb) to appear suddenly. POP-UP (noun) a window or ad that appears suddenly." },
  { "term": "Set up", "definition": "SET UP (verb) to arrange or install. SETUP (noun) arrangement or configuration." },
  { "term": "Log in", "definition": "LOG IN (verb) to sign in. LOGIN (noun) credentials or sign-in process." },
  { "term": "Feed back", "definition": "FEED BACK (verb) to return information (rare). FEEDBACK (noun) comments or response." }
];
let current = 0;
let flipped = false;
// --- Audio Context (created on first interaction to satisfy browser policy) ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
// Steamy whoosh: filtered noise burst with pitch sweep
function playWhoosh() {
  const ctx = getAudioCtx();
  const duration = 0.9;
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  // Bandpass filter sweeping upward then down
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(200, ctx.currentTime);
  filter.frequency.linearRampToValueAtTime(1800, ctx.currentTime + 0.25);
  filter.frequency.linearRampToValueAtTime(400, ctx.currentTime + duration);
  filter.Q.value = 1.5;
  // Low-pass to soften
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 2400;
  // Gain envelope: quick attack, slow decay
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.05);
  gainNode.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.3);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  // Add a subtle low hiss layer
  const hissBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const hissData = hissBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) hissData[i] = (Math.random() * 2 - 1) * 0.15;
  const hissSource = ctx.createBufferSource();
  hissSource.buffer = hissBuffer;
  const hissGain = ctx.createGain();
  hissGain.gain.setValueAtTime(0.3, ctx.currentTime);
  hissGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  hissSource.connect(hissGain);
  hissGain.connect(ctx.destination);
  hissSource.start();
  hissSource.stop(ctx.currentTime + duration);
  source.connect(filter);
  filter.connect(lp);
  lp.connect(gainNode);
  gainNode.connect(ctx.destination);
  source.start();
  source.stop(ctx.currentTime + duration);
}
// Metal clank: two short sine tones with fast decay + noise transient
function playClank() {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  // Main metallic clank tone
  [220, 440, 660].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq * (1 + i * 0.02), now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.15);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.18 / (i + 1), now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.2);
  });
  // Noise transient (the "impact" click)
  const impactSize = ctx.sampleRate * 0.08;
  const impactBuf = ctx.createBuffer(1, impactSize, ctx.sampleRate);
  const impactData = impactBuf.getChannelData(0);
  for (let i = 0; i < impactSize; i++) impactData[i] = (Math.random() * 2 - 1);
  const impactSrc = ctx.createBufferSource();
  impactSrc.buffer = impactBuf;
  const impactFilter = ctx.createBiquadFilter();
  impactFilter.type = 'highpass';
  impactFilter.frequency.value = 800;
  const impactGain = ctx.createGain();
  impactGain.gain.setValueAtTime(0.4, now);
  impactGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  impactSrc.connect(impactFilter);
  impactFilter.connect(impactGain);
  impactGain.connect(ctx.destination);
  impactSrc.start(now);
  impactSrc.stop(now + 0.08);
}
function showCard() {
  document.getElementById('termText').textContent = cards[current].term;
  document.getElementById('defText').textContent = cards[current].definition;
  document.getElementById('counter').textContent = `Card ${current + 1} of ${cards.length}`;
  // Reset flip
  flipped = false;
  document.getElementById('flipInner').classList.remove('flipped');
}
function flipCard() {
  playWhoosh();
  flipped = !flipped;
  document.getElementById('flipInner').classList.toggle('flipped', flipped);
}
function nextCard() {
  playClank();
  current = (current + 1) % cards.length;
  showCard();
}
function prevCard() {
  playClank();
  current = (current - 1 + cards.length) % cards.length;
  showCard();
}
showCard();
</script>
